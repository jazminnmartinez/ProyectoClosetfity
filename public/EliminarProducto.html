<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>EliminarProducto</title>
  <link rel="stylesheet" href="../css/EliminarProducto.css" />
</head>
<body>
   <header>
    <div class="nav-left">
      <span class="flecha" onclick="history.back()">&#8592;</span>
    </div>
  </header>
  
  <div class="center-wrapper">
    <div class="layout">
      
      <!-- Panel izquierdo -->
      <div class="left-panel">
      <div class="menu-item selected">
          <img src="Imagenes/productos.png" alt="Productos" width="20" height="20" />
          <span><a href="menu.html">Productos</a></span>
        </div>
      <div class="sub-item" onclick="cargarPagina('front\AgregarProducto.html')">
            <img src="Imagenes/agregar.png" alt="Agregar" width="18" height="18" />
            <span><a href="AgregarProducto.html">Agregar Producto</a></span>
          </div>
       <div class="sub-item" onclick="cargarPagina('EliminarProducto.html')">
            <img src="Imagenes/eliminar.png" alt="Eliminar" width="18" height="18" />
            <span><a href="EliminarProducto.html">Eliminar Producto</a></span>
          </div>
      <div class="sub-item" onclick="cargarPagina('BuscarProducto.html')">
            <img src="Imagenes/buscar.png" alt="Buscar"/>
            <span><a href="BuscarProducto.html">Buscar Producto</a></span>
          </div>
    </div>

      <!-- Panel derecho -->
      <div class="right-panel">
      <div class="top-menu">
        <div class="menu-item">
          <img src="Imagenes/venta.png" alt="Venta" />
          <span><a href="Venta.html">Venta</a></span>
        </div>
        <div class="menu-item">
        <img src="Imagenes/reporte.png" alt="Reporte"/>
        <span><a href="reporte.html">Reporte</a></span>
      </div>
      </div>
        <!-- Formulario de eliminación -->
        <div class="form-container">
          <h2>Eliminar Producto</h2>
          <div class="form-content">
            <form id="delete-form">
              <label>
                Código:
                <input type="text" name="codigo" required />
              </label>
              <button type="submit">Eliminar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
  document.getElementById('delete-form').addEventListener('submit', function(event) {
    event.preventDefault();

    const codigo = this.codigo.value;

    fetch(`http://localhost:3000/api/productos/${codigo}`, {
      method: 'DELETE'
    })
    .then(res => {
      if (!res.ok) throw new Error("No se pudo eliminar el producto");
      return res.json();
    })
    .then(data => {
      alert("Problema al eliminar producto");
      this.reset(); 
    })
    .catch(error => {
      alert("Producto eliminado con exito!");
      console.error("Error:", error);
    });
  });
</script>
</body>
</html>
